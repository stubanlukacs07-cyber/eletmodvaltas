<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Életmódváltás">
<meta name="theme-color" content="#123f33">
<link rel="apple-touch-icon" href="https://stubanlukacs07-cyber.github.io/index.html/icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="https://stubanlukacs07-cyber.github.io/index.html/icon-512.png">
<title>Életmódváltás</title>
<style>
  :root{
    --bg:#eef2ef; --surface:#ffffff; --surface2:#f4f7f5;
    --ink:#16211d; --muted:#64726b; --line:#e2e8e3;
    --acc:#1f6f5c; --acc-d:#123f33; --acc-soft:#e4efea; --acc-lite:#33977c;
    --g1:#164a3b; --g2:#0f382d;
    --honey:#cf9b3f; --danger:#a8503f; --r:16px;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);}
  body{min-height:100dvh;-webkit-text-size-adjust:100%;}
  button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;padding:0;-webkit-appearance:none;appearance:none;}
  input{font-family:inherit;-webkit-appearance:none;appearance:none;}
  ol,ul{margin:0;padding:0;}

  .hd{position:sticky;top:0;z-index:20;background:linear-gradient(160deg,var(--g1) 0%,var(--acc-d) 60%,var(--g2) 100%);
    color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 16px 14px;
    border-bottom-left-radius:22px;border-bottom-right-radius:22px;box-shadow:0 6px 22px rgba(15,40,32,.28);}
  .hd-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .brand{font-size:13px;letter-spacing:1.6px;font-weight:800;color:rgba(255,255,255,.85);}
  .brand small{display:block;letter-spacing:.4px;font-weight:500;font-size:10px;color:rgba(255,255,255,.6);margin-top:3px;}
  .ring{display:block;flex-shrink:0;}
  .hd-sub{display:flex;align-items:center;gap:10px;margin-top:12px;min-height:40px;}
  .nav{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.12);font-size:22px;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:transform .12s,background .15s;}
  .nav:active{transform:scale(.9);background:rgba(255,255,255,.22);}
  .hd-day{flex:1;text-align:center;}
  .hd-dayname{font-size:21px;font-weight:700;letter-spacing:.2px;line-height:1.1;}
  .hd-date{font-size:12.5px;color:rgba(255,255,255,.7);margin-top:2px;}
  .totoday,.backtoday{background:var(--honey);color:#3a2a06;font-weight:700;font-size:11px;padding:3px 9px;border-radius:20px;letter-spacing:.3px;}
  .hd-title{flex:1;font-size:21px;font-weight:700;}
  .reset{background:rgba(255,255,255,.14);color:#fff;font-size:13px;font-weight:600;padding:9px 14px;border-radius:20px;transition:transform .12s;}
  .reset:active{transform:scale(.94);}
  .hd-back{margin-top:10px;text-align:center;}
  .backtoday{padding:8px 16px;border-radius:20px;transition:transform .12s;}
  .backtoday:active{transform:scale(.95);}

  .content{padding:15px 14px calc(120px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto;}
  .eyebrow{font-size:11px;letter-spacing:1.6px;text-transform:uppercase;font-weight:700;color:var(--acc);margin:2px 2px 9px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:11px;box-shadow:0 1px 2px rgba(20,33,29,.04);}

  .sess{background:var(--acc-d);color:#fff;border:none;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .sess .s-name{font-size:19px;font-weight:700;}
  .sess .s-tag{font-size:12px;color:rgba(255,255,255,.72);margin-top:3px;}
  .sess .s-hint{font-size:11.5px;color:rgba(255,255,255,.85);background:rgba(255,255,255,.1);padding:5px 10px;border-radius:20px;text-align:center;line-height:1.35;max-width:44%;}

  .ex-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .ex-name{font-size:16px;font-weight:650;line-height:1.25;}
  .ex-target{font-size:13px;font-weight:600;color:var(--acc);white-space:nowrap;}
  .pips{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}
  .pip{width:30px;height:30px;border-radius:50%;border:2px solid #c4d3cb;background:#fff;position:relative;transition:transform .12s,border-color .18s;}
  .pip::after{content:"";position:absolute;top:5px;right:5px;bottom:5px;left:5px;border-radius:50%;background:transparent;transition:background .18s;}
  .pip.on{border-color:var(--acc);}
  .pip.on::after{background:var(--acc);}
  .pip:active{transform:scale(.85);}
  .ex-note{font-size:12.5px;color:var(--muted);margin-top:11px;line-height:1.4;padding-top:10px;border-top:1px solid var(--line);}
  .card.is-done{background:var(--acc-soft);border-color:rgba(31,111,92,.25);}

  .rest-card{text-align:center;padding:22px 16px;}
  .lvl-note{font-size:12.5px;color:var(--muted);line-height:1.45;margin:0 4px 12px;padding:0 2px;}
  .diffbar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 14px;margin:0 0 12px;}
  .diffbar-k{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);display:block;}
  .diffbar-v{font-size:15px;font-weight:700;color:var(--ink);}
  .diffbar-btns{display:flex;gap:8px;}
  .dstep{width:38px;height:38px;border-radius:11px;border:1px solid var(--acc);background:var(--acc-lite);color:var(--acc-d);font-size:22px;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;}
  .dstep:disabled{opacity:.35;border-color:var(--line);background:var(--surface2);color:var(--muted);}
  .sugg{background:var(--acc-lite);border:1px solid var(--acc);border-radius:14px;padding:13px 15px;margin:0 0 12px;}
  .sugg-t{font-size:14px;font-weight:700;color:var(--acc-d);}
  .sugg-s{font-size:13.5px;color:var(--ink);margin:3px 0 10px;}
  .sugg-btns{display:flex;gap:9px;}
  .sugg-yes{flex:1;padding:10px;border-radius:11px;border:none;background:var(--acc-d);color:#fff;font-size:13.5px;font-weight:700;}
  .sugg-no{padding:10px 14px;border-radius:11px;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-size:13.5px;font-weight:600;}
  .exfb{display:flex;align-items:center;gap:7px;margin-top:11px;padding-top:11px;border-top:1px solid var(--line);flex-wrap:wrap;}
  .exfb-q{font-size:12px;color:var(--muted);margin-right:2px;}
  .fchip{padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--surface2);color:var(--ink);font-size:12.5px;font-weight:600;}
  .fchip.on{background:var(--acc);border-color:var(--acc);color:#fff;}
  .sessfb{margin-top:4px;}
  .sessfb-q{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:11px;}
  .sessfb-btns{display:flex;flex-direction:column;gap:8px;}
  .fbig{padding:12px;border-radius:12px;border:1px solid var(--line);background:var(--surface2);color:var(--ink);font-size:14px;font-weight:600;text-align:center;}
  .fbig.on.ez{background:var(--acc);border-color:var(--acc);color:#fff;}
  .fbig.on.ok{background:var(--acc-d);border-color:var(--acc-d);color:#fff;}
  .fbig.on.hard{background:#c0563a;border-color:#c0563a;color:#fff;}
  .sessfb-note{font-size:12px;color:var(--muted);line-height:1.45;margin-top:10px;}
  .ob-opt{font-size:11px;font-weight:600;color:var(--acc-d);background:var(--acc-lite);border:1px solid var(--acc);padding:2px 8px;border-radius:20px;vertical-align:middle;margin-left:6px;}
  .sport-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .sport-chip{display:flex;align-items:center;gap:8px;padding:12px;border-radius:13px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);font-size:13px;font-weight:600;text-align:left;}
  .sport-chip.on{border-color:var(--acc);background:var(--acc-lite);color:var(--acc-d);}
  .sc-emoji{font-size:18px;flex-shrink:0;}
  .sc-lbl{line-height:1.2;}
  .ex-info{margin-top:10px;display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;border:1px solid var(--acc);background:var(--acc-lite);color:var(--acc-d);font-size:12px;font-weight:700;}
  .fi-sheet{position:relative;width:min(440px,92vw);max-height:86vh;overflow-y:auto;background:var(--surface);border-radius:20px;-webkit-overflow-scrolling:touch;}
  .fi-head{display:flex;align-items:center;gap:14px;padding:20px 20px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);z-index:1;}
  .fi-fig{width:96px;height:80px;flex-shrink:0;background:var(--acc-lite);border-radius:14px;display:flex;align-items:center;justify-content:center;padding:6px;}
  .fi-fig svg{width:100%;height:100%;}
  .figsvg{stroke:var(--acc-d);fill:none;stroke-width:3.6;stroke-linecap:round;stroke-linejoin:round;}
  .figsvg .hd{fill:var(--acc-d);stroke:none;}
  .figsvg .eq{stroke:var(--acc);}
  .fi-name{font-size:17px;font-weight:800;color:var(--ink);line-height:1.15;}
  .fi-sub{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .fi-x{position:absolute;top:13px;right:13px;width:30px;height:30px;border-radius:50%;border:none;background:var(--surface2);color:var(--muted);font-size:14px;line-height:1;z-index:2;}
  .fi-body{padding:16px 20px 6px;}
  .fi-sec{margin-bottom:15px;}
  .fi-h{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--acc-d);font-weight:800;margin-bottom:5px;}
  .fi-sec p{font-size:14px;color:var(--ink);line-height:1.5;margin:0;}
  .fi-sec ol,.fi-sec ul{margin:0;padding-left:19px;}
  .fi-sec li{font-size:14px;color:var(--ink);line-height:1.5;margin-bottom:4px;}
  .fi-safe{background:#fff5ec;border:1px solid #f0c9a8;color:#9a5a2a;border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.5;margin:2px 0 16px;}
  .fi-close{position:sticky;bottom:0;width:100%;padding:15px;border:none;background:var(--acc-d);color:#fff;font-size:15px;font-weight:700;}
  .sp-list{margin-top:2px;}
  .sp-row{padding:14px 0;border-bottom:1px solid var(--line);}
  .sp-row:last-child{border-bottom:none;}
  .sp-name{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:9px;}
  .sp-btns{display:flex;flex-wrap:wrap;gap:7px;}
  .lvl-btn{padding:8px 12px;border-radius:11px;border:1.5px solid var(--line);background:var(--surface);color:var(--ink);font-size:12.5px;font-weight:600;}
  .lvl-btn.on{border-color:var(--acc);background:var(--acc-lite);color:var(--acc-d);}
  .skill-badge{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.06em;color:var(--acc-d);background:var(--acc-lite);border:1px solid var(--acc);padding:3px 9px;border-radius:20px;margin-bottom:10px;}
  .ex.is-skill{border-left:3px solid var(--acc);}
  .rest-emoji{font-size:30px;}
  .rest-title{font-size:19px;font-weight:700;margin-top:6px;}
  .rest-text{font-size:13.5px;color:var(--muted);line-height:1.5;margin:9px auto 16px;max-width:34ch;}
  .toggle{display:inline-flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--line);padding:11px 16px;border-radius:26px;font-size:14px;font-weight:600;transition:transform .12s;}
  .toggle:active{transform:scale(.96);}
  .toggle.on{background:var(--acc);color:#fff;border-color:var(--acc);}
  .tick{width:22px;height:22px;border-radius:50%;border:2px solid #c4d3cb;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;background:#fff;}
  .toggle.on .tick{background:#fff;color:var(--acc);border-color:#fff;}

  .track-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .t-eaten{font-size:28px;font-weight:800;letter-spacing:-.6px;font-variant-numeric:tabular-nums;line-height:1;}
  .t-eaten span{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:0;}
  .t-left{font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--line);padding:5px 10px;border-radius:20px;font-weight:600;white-space:nowrap;}
  .t-badge{font-size:12px;color:#3a2a06;background:var(--honey);padding:6px 11px;border-radius:20px;font-weight:700;white-space:nowrap;}
  .t-tag{font-size:12px;color:var(--acc);font-weight:600;margin:9px 0 2px;}
  .kbar{height:10px;background:var(--surface2);border:1px solid var(--line);border-radius:20px;overflow:hidden;margin-top:10px;}
  .kbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc-lite));border-radius:20px;transition:width .35s ease;}
  .mrow{display:flex;justify-content:space-between;align-items:baseline;margin-top:13px;font-size:13px;}
  .mlbl{color:var(--muted);font-weight:600;}
  .mval{font-weight:700;font-variant-numeric:tabular-nums;}
  .mval em{font-style:normal;font-weight:500;color:var(--muted);font-size:12px;}
  .mmini{height:6px;background:var(--surface2);border-radius:20px;overflow:hidden;margin-top:5px;}
  .mmini>i{display:block;height:100%;background:var(--acc);border-radius:20px;transition:width .35s ease;}
  .track.is-full{background:var(--acc-soft);border-color:rgba(31,111,92,.25);}
  .portion-note{font-size:11.5px;color:var(--muted);margin:8px 2px 0;line-height:1.4;}
  .ing-row{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:1px solid var(--line);}
  .ing-row:last-child{border-bottom:none;}
  .ing-amt{font-weight:700;font-variant-numeric:tabular-nums;min-width:62px;font-size:13.5px;}
  .ing-nm{flex:1;font-size:13.5px;color:var(--ink);}
  .ing-sw{width:32px;height:32px;border-radius:9px;background:var(--surface);border:1px solid var(--line);color:var(--acc);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;}
  .ing-sw:active{transform:rotate(180deg) scale(.9);}
  .ing-sw.ghost{border:none;background:none;}
  .shop-total{display:flex;justify-content:space-between;align-items:baseline;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:14px;}
  .shop-total b{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;}
  .shop-export{margin-top:12px;padding:13px;font-size:14px;}
  .shop-row .shop-label{flex:1;min-width:0;}
  .shop-price{margin-left:auto;font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0;}
  .exp-area{width:100%;height:220px;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:12.5px;line-height:1.55;font-family:inherit;color:var(--ink);background:var(--surface2);resize:none;margin-bottom:14px;}
  .toast{position:fixed;left:50%;bottom:calc(98px + env(safe-area-inset-bottom));transform:translateX(-50%);background:var(--acc-d);color:#fff;padding:11px 18px;border-radius:24px;font-size:13.5px;font-weight:600;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.28);}

  .meal{padding:0;overflow:hidden;}
  .meal-row{display:flex;align-items:center;gap:12px;padding:13px 14px;}
  .meal-check{flex-shrink:0;width:30px;height:30px;border-radius:50%;border:2px solid #c4d3cb;background:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;transition:transform .12s,background .18s,border-color .18s;}
  .meal-check.on{background:var(--acc);border-color:var(--acc);}
  .meal-check:active{transform:scale(.85);}
  .meal-main{flex:1;text-align:left;min-width:0;}
  .meal-name{font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:700;color:var(--acc);}
  .meal-kcal{font-weight:500;color:var(--muted);letter-spacing:.3px;}
  .meal-food{font-size:14px;line-height:1.35;margin-top:3px;color:var(--ink);}
  .meal.is-done .meal-food{color:var(--muted);}
  .caret{flex-shrink:0;width:30px;height:30px;font-size:22px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:transform .2s;}
  .caret.open{transform:rotate(90deg);color:var(--acc);}
  .prep{background:var(--surface2);border-top:1px solid var(--line);padding:13px 16px 15px;}
  .prep .p-h{font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:9px;}
  .prep ol{list-style:none;counter-reset:s;}
  .prep li{counter-increment:s;position:relative;padding-left:30px;font-size:13.5px;line-height:1.5;margin-bottom:9px;color:var(--ink);}
  .prep li:last-child{margin-bottom:0;}
  .prep li::before{content:counter(s);position:absolute;left:0;top:0;width:21px;height:21px;background:var(--acc);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}

  .prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .prog-lbl{font-size:14px;font-weight:600;}
  .prog-num{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .bar{height:9px;background:var(--surface2);border-radius:20px;overflow:hidden;border:1px solid var(--line);}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc-lite));border-radius:20px;transition:width .3s ease;}
  .cat-h{font-size:12px;letter-spacing:1.3px;text-transform:uppercase;font-weight:700;color:var(--acc);margin:20px 4px 9px;}
  .shop-row{width:100%;display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:8px;text-align:left;transition:background .15s;}
  .shop-row:active{background:var(--surface2);}
  .box{flex-shrink:0;width:26px;height:26px;border-radius:8px;border:2px solid #c4d3cb;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;transition:background .18s,border-color .18s;}
  .shop-row.is-done .box{background:var(--acc);border-color:var(--acc);}
  .shop-label{font-size:14.5px;line-height:1.3;}
  .shop-row.is-done .shop-label{color:var(--muted);text-decoration:line-through;text-decoration-color:#b9c7bf;}
  .note{font-size:12px;color:var(--muted);line-height:1.5;text-align:center;margin:20px 8px 4px;padding-top:14px;border-top:1px solid var(--line);}

  /* Terv summary */
  .big-num{font-size:34px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums;}
  .big-num span{font-size:14px;font-weight:600;color:var(--muted);}
  .stat-grid{display:flex;gap:9px;margin-top:12px;}
  .stat{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:11px 6px;text-align:center;}
  .stat b{display:block;font-size:18px;font-weight:750;font-variant-numeric:tabular-nums;}
  .stat small{font-size:10.5px;color:var(--muted);letter-spacing:.2px;}
  .verdict-ok{background:var(--acc-soft);border-color:rgba(31,111,92,.3);}
  .verdict-warn{background:#fbeee4;border-color:#e6c3a0;}
  .verdict-h{font-size:15px;font-weight:750;margin-bottom:6px;}
  .verdict-h.ok{color:var(--acc-d);}
  .verdict-h.warn{color:#8f4a1f;}
  .verdict-t{font-size:13.5px;line-height:1.55;color:var(--ink);}
  .line-row{display:flex;justify-content:space-between;font-size:13.5px;padding:9px 0;border-bottom:1px solid var(--line);}
  .line-row:last-child{border-bottom:none;}
  .line-row .k{color:var(--muted);}
  .line-row .v{font-weight:650;text-align:right;}
  .btn-primary{display:block;width:100%;background:var(--acc);color:#fff;font-size:15px;font-weight:700;padding:15px;border-radius:14px;text-align:center;transition:transform .12s;margin-top:6px;}
  .btn-primary:active{transform:scale(.98);}
  .btn-ghost{display:block;width:100%;background:var(--surface2);color:var(--ink);border:1px solid var(--line);font-size:14px;font-weight:600;padding:13px;border-radius:12px;text-align:center;margin-top:10px;transition:transform .12s;}
  .btn-ghost:active{transform:scale(.98);}

  /* Onboarding */

/* ---------- ENGINE ---------- */
function bmr(p){ var b=10*p.kg+6.25*p.cm-5*p.age; return p.sex==="no"?b-161:b+5; }
function actMult(f){ return f==="1-2"?1.375:f==="3"?1.45:f==="4-5"?1.55:1.65; }
function tdee(p){ return bmr(p)*actMult(p.freq); }
function round5(n){ return Math.round(n/5)*5; }

function computePlan(p){
  var T=tdee(p), B=bmr(p), kg=p.kg;
  var goal=p.goal, feasible=true, verdict="", weeklyRate=0, etaWeeks=0, target=T;
  var lbm = p.bf? kg*(1-p.bf/100) : 0;
  var protein = lbm? Math.round(lbm*2.4) : Math.round(kg*(goal==="karban"?1.8:2.0));
  var fat=Math.round(kg*0.9);

  if(goal==="fogyas"){
    var reqRate=p.targetKg/p.weeks;           // kg/hét kívánt
    var maxRate=0.010*kg, recRate=0.0066*kg;  // egészséges max / ajánlott
    if(reqRate>maxRate+1e-9){
      feasible=false; weeklyRate=maxRate;
      etaWeeks=Math.ceil(p.targetKg/recRate);
      var loKg=Math.round(recRate*p.weeks*10)/10, hiKg=Math.round(maxRate*p.weeks*10)/10;
      verdict="Sajnos "+fmtKg(p.targetKg)+" "+p.weeks+" hét alatt egészségesen nem reális — ez heti "+fmtKg(reqRate)+"-ot jelentene, ami az izom rovására menne. Reálisan ~"+fmtKg(loKg)+"–"+fmtKg(hiKg)+" adható le ennyi idő alatt biztonságosan. A teljes "+fmtKg(p.targetKg)+"-hoz ~"+etaWeeks+" hét kellene. Az alábbi terv a leggyorsabb egészséges ütemre van belőve.";
    } else { weeklyRate=reqRate; verdict="A célod reális. Heti ~"+fmtKg(weeklyRate)+"-os ütemmel "+fmtKg(p.targetKg)+" "+p.weeks+" hét alatt elérhető, az izom megtartása mellett."; }
    var dailyDef=weeklyRate*7700/7;
    var maxDef=Math.max(0, Math.min(T-B, 0.28*T));  // ne menj a BMR alá, max ~28%
    if(dailyDef>maxDef){ dailyDef=maxDef; weeklyRate=dailyDef*7/7700; }
    target=Math.round(T-dailyDef);
  } else if(goal==="izom"){
    var dfi=diffOf(p), surplus=dfi<=2?350:(dfi===3?250:150);
    target=Math.round(T+surplus);
    var reqG=p.targetKg/p.weeks, maxG=(DIFF[dfi]||DIFF[3]).gain;
    if(reqG>maxG+1e-9){ feasible=false; weeklyRate=maxG; etaWeeks=Math.ceil(p.targetKg/maxG);
      var hiG=Math.round(maxG*p.weeks*10)/10;
      verdict="Sajnos "+fmtKg(p.targetKg)+" tiszta izom "+p.weeks+" hét alatt nem reális — az izomépítés ennél jóval lassabb. Reálisan ~"+fmtKg(hiG)+" izom építhető ennyi idő alatt a szintedhez mérten. A teljes "+fmtKg(p.targetKg)+"-hoz ~"+etaWeeks+" hét kellene. Az alábbi terv a maximális egészséges építő ütemre van belőve.";
    } else { weeklyRate=reqG; verdict="A célod reális. A szintedhez mérten "+fmtKg(p.targetKg)+" izom "+p.weeks+" hét alatt reálisan felépíthető, kontrollált többlettel."; }
  } else if(goal==="rekomp"){
    protein=lbm?Math.round(lbm*2.6):Math.round(kg*2.2);
    var reqR=p.targetKg/p.weeks, maxR=0.006*kg, recR=0.0035*kg;
    if(reqR>maxR+1e-9){ feasible=false; weeklyRate=maxR; etaWeeks=Math.ceil(p.targetKg/recR);
      var loR=Math.round(recR*p.weeks*10)/10, hiR=Math.round(maxR*p.weeks*10)/10;
      verdict="Rekompozíciónál a súlyodat tartod, közben lassan formálódsz — ezért "+fmtKg(p.targetKg)+" "+p.weeks+" hét alatt nem reális. Ennyi idő alatt reálisan ~"+fmtKg(loR)+"–"+fmtKg(hiR)+" zsír formálható át; a teljes célhoz ~"+etaWeeks+" hét kell. Az alábbi terv a fenntartható rekomp-ütemre van belőve.";
    } else { weeklyRate=reqR; verdict="Rekompozíció: enyhe deficit + magas fehérje. Egyszerre épül izom és fogy a zsír — a mérleg alig mozdul, a tükör viszont változik. Reális, türelmes út."; }
    var ddr=weeklyRate*7700/7, maxdr=Math.max(0,Math.min(T-B,0.18*T)); if(ddr>maxdr){ddr=maxdr;weeklyRate=ddr*7/7700;}
    target=Math.round(T-ddr);
  } else {
    target=Math.round(T);
    verdict="Karbantartás: a súlyodat tartod, a hangsúly az erőn, a teljesítményen és a szokások rögzítésén van.";
  }
  var carb=Math.max(40, Math.round((target-protein*4-fat*9)/4));
  return {tdee:Math.round(T), bmr:Math.round(B), target:target, protein:protein, fat:fat, carb:carb, feasible:feasible, verdict:verdict, weeklyRate:weeklyRate, etaWeeks:etaWeeks};
}
function fmtKg(n){ var r=Math.round(n*10)/10; return (r%1===0?r.toFixed(0):r.toFixed(1))+" kg"; }
function bfRow(p){ if(!p||!p.bf) return ""; var s='<div class="line-row"><span class="k">Testzsír</span><span class="v">'+p.bf+"%"+(p.bfTarget?" → cél "+p.bfTarget+"%":"")+'</span></div>';
  if(p.bf&&p.bfTarget&&p.bfTarget<p.bf){ var lbm=p.kg*(1-p.bf/100),tw=lbm/(1-p.bfTarget/100),lose=Math.max(0,p.kg-tw); s+='<div class="line-row"><span class="k">Becsült leadandó zsír</span><span class="v">~'+fmtKg(lose)+'</span></div>'; }
  return s; }
function has(g,tg){ return g&&g.tags&&g.tags.indexOf(tg)>=0; }
function ingMac(id,grams){ var g=ING[id]||{p:0,c:0,f:0},r=grams/100,p=g.p*r,c=g.c*r,f=g.f*r; return {p:p,c:c,f:f,kc:p*4+c*4+f*9}; }
function resolveIng(id){ var pf=profile||{},sw=pf.swaps||{},diet=pf.diet||[]; if(sw[id]&&ING[sw[id]]) id=sw[id];
  if(diet.indexOf("veget")>=0&&(has(ING[id],"meat")||has(ING[id],"fish"))) id="tofu";
  if(diet.indexOf("hal")>=0&&has(ING[id],"fish")) id="csirke";
  if(diet.indexOf("tojas")>=0&&has(ING[id],"egg")) id="turo";
  if(diet.indexOf("dio")>=0&&has(ING[id],"nut")) id="tokmag"; return id; }
function ingName(id){ var g=ING[id]; if(!g) return id; var nm=g.n,diet=(profile&&profile.diet)||[];
  if(diet.indexOf("laktoz")>=0&&has(g,"lac")) nm="laktózmentes "+nm;
  if(diet.indexOf("glutation")>=0&&has(g,"glu")) nm="gluténmentes "+nm; return nm; }
function dispAmt(id,grams){ var g=ING[id]||{}; if(g.u==="db"){return Math.max(1,Math.round(grams/g.ug))+" db";} if(g.u==="szelet"){return Math.max(1,Math.round(grams/g.ug))+" szelet";} if(g.u==="ml"){return Math.round(grams)+" ml";} return Math.round(grams)+" g"; }
function roundStep(grams,step){ step=step||5; return Math.max(step,Math.round(grams/step)*step); }
function nextInGroup(oid){ var grp=ING[oid]&&ING[oid].grp,arr=SWAPGRP[grp]; if(!arr||arr.length<2) return oid; var cur=(profile.swaps&&profile.swaps[oid])?profile.swaps[oid]:oid,ix=arr.indexOf(cur); if(ix<0) ix=0; return arr[(ix+1)%arr.length]; }
function swappable(oid){ var grp=ING[oid]&&ING[oid].grp,arr=SWAPGRP[grp]; return !!(arr&&arr.length>1); }
function mealTotals(meal,factor){ var kc=0,p=0,c=0,f=0; for(var j=0;j<meal.i.length;j++){ var rid=resolveIng(meal.i[j][0]),g2=roundStep(meal.i[j][1]*factor,ING[rid].step),m=ingMac(rid,g2); kc+=m.kc;p+=m.p;c+=m.c;f+=m.f; } return {kc:Math.round(kc),p:Math.round(p),c:Math.round(c),f:Math.round(f)}; }
function mealFoodLine(meal,factor){ var parts=[]; for(var j=0;j<meal.i.length;j++){ var rid=resolveIng(meal.i[j][0]),g2=roundStep(meal.i[j][1]*factor,ING[rid].step); parts.push(dispAmt(rid,g2)+" "+ingName(rid)); } return parts.join(" + "); }
function dayBaseKc(dow){ var a=MEALS[dow],s=0; for(var i=0;i<a.length;i++){ var it=a[i].i; for(var j=0;j<it.length;j++) s+=ingMac(resolveIng(it[j][0]),it[j][1]).kc; } return s; }
function dayFactor(dow){ var b=dayBaseKc(dow); return b>0?dayTarget(dow)/b:1; }

function readStats(){

      c=parseFloat((document.getElementById("in-cm")||{}).value),
      k=parseFloat((document.getElementById("in-kg")||{}).value);
  if(!(a>=13&&a<=100)) return "Add meg az életkorod (13–100).";
  if(!(c>=120&&c<=230)) return "Add meg a magasságod cm-ben (120–230).";
  if(!(k>=35&&k<=250)) return "Add meg a testsúlyod kg-ban (35–250).";
  obDraft.age=Math.round(a); obDraft.cm=Math.round(c); obDraft.kg=Math.round(k*10)/10;

    for(var k=0;k<me.pr.length;k++) steps+='<li>'+esc(me.pr[k])+'</li>';
    h+='<div class="card meal '+(chk?"is-done":"")+'"><div class="meal-row"><button class="meal-check '+(chk?"on":"")+'" data-act="meal" data-m="'+i2+'">'+(chk?"✓":"")+'</button><button class="meal-main" data-act="expand" data-m="'+i2+'"><div class="meal-name">'+esc(me.m)+' <span class="meal-kcal">· '+mt.kc+' kcal</span></div><div class="meal-food">'+esc(mealFoodLine(me,factor))+'</div></button><button class="caret '+(op?"open":"")+'" data-act="expand" data-m="'+i2+'">›</button></div>'+(op?'<div class="prep"><div class="p-h">Hozzávalók</div><div class="ings">'+rows+'</div><div class="p-h" style="margin-top:15px">Elkészítés</div><ol>'+steps+'</ol></div>':'')+'</div>';
  }
  return h;
}
var CATN={hus:"Hús & hal",tojas:"Tojás",tej:"Tejtermék",hutott:"Hűtött",zold:"Zöldség & gyümölcs",fagy:"Fagyasztott",szaraz:"Száraz áru",pek:"Pékáru",kamra:"Kamra · fűszerek"};
var CATORDER=["hus","tojas","tej","hutott","zold","fagy","szaraz","pek","kamra"];
function shopAgg(){ var agg={}; for(var dow=0;dow<7;dow++){ var factor=dayFactor(dow),meals=MEALS[dow]; for(var mi=0;mi<meals.length;mi++){ var it=meals[mi].i; for(var j=0;j<it.length;j++){ var rid=resolveIng(it[j][0]),g=roundStep(it[j][1]*factor,ING[rid].step); agg[rid]=(agg[rid]||0)+g; } } } return agg; }
function shopAmt(id,grams){ var g=ING[id]; if(g.u==="db") return Math.ceil(grams/g.ug)+" db"; if(g.u==="szelet") return Math.ceil(grams/g.ug)+" szelet"; if(g.u==="ml"){ return grams>=1000?((Math.round(grams/100)/10)+" l"):(Math.round(grams)+" ml"); } return grams>=1000?((Math.round(grams/100)/10)+" kg"):(Math.round(grams)+" g"); }
function ingCost(id,grams){ return Math.round(grams/1000*ING[id].price); }
function shopTotal(){ var agg=shopAgg(),tt=0; for(var id in agg) tt+=ingCost(id,agg[id]); return tt; }
function fmtFt(n){ return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g," ")+" Ft"; }
function buildExport(){ var agg=shopAgg(),L=["ÉLETMÓDVÁLTÁS — heti bevásárlólista",""];
  for(var ci=0;ci<CATORDER.length;ci++){ var cat=CATORDER[ci],ids=[]; for(var id in agg){ if(ING[id].cat===cat) ids.push(id); } if(!ids.length) continue;
    L.push(CATN[cat].toUpperCase()); for(var k=0;k<ids.length;k++){ var d=ids[k]; L.push("- "+shopAmt(d,agg[d])+"  "+ingName(d)); } L.push(""); }
  L.push("Becsült érték: ~"+fmtFt(shopTotal())+" / hét"); L.push("(A kamrai alapok — olaj, méz, fűszerek — ritkán pótlandók.)"); return L.join("\n"); }
function doExport(){ var txt=buildExport();
  if(navigator.share){ navigator.share({title:"Bevásárlólista",text:txt}).catch(function(){}); return; }
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(function(){ toast="Kimásolva a vágólapra ✓"; render(); setTimeout(function(){ toast=""; render(); },1800); }).catch(function(){ exportModal=txt; render(); }); return; }
  exportModal=txt; render(); }
function viewBolt(){
  var agg=shopAgg(),cnt=shopCounts(),pct=cnt.tot?Math.round(cnt.done/cnt.tot*100):0,total=shopTotal();
  var h='<div class="card"><div class="prog-top"><div class="prog-lbl">Heti lista · '+cnt.tot+' tétel</div><div class="prog-num">'+cnt.done+'/'+cnt.tot+' megvéve</div></div><div class="bar"><i style="width:'+pct+'%"></i></div><div class="shop-total"><span>Becsült érték</span><b>~'+fmtFt(total)+' / hét</b></div><button class="btn-primary shop-export" data-act="export">Lista exportálása / megosztása</button></div>';
  for(var ci=0;ci<CATORDER.length;ci++){ var cat=CATORDER[ci],ids=[]; for(var id in agg){ if(ING[id].cat===cat) ids.push(id); } if(!ids.length) continue;
    h+='<div class="cat-h">'+esc(CATN[cat])+'</div>';
    for(var k=0;k<ids.length;k++){ var d=ids[k],key="b-"+d,ck=!!state.shop[key];
      h+='<button class="shop-row '+(ck?"is-done":"")+'" data-act="shop" data-key="'+key+'"><span class="box">'+(ck?"✓":"")+'</span><span class="shop-label">'+esc(shopAmt(d,agg[d]))+' · '+esc(ingName(d))+'</span><span class="shop-price">~'+fmtFt(ingCost(d,agg[d]))+'</span></button>';
    }
  }
  h+='<div class="note">A lista a heti tervedből számolva, a cseréiddel együtt. A kamrai alapok (olaj, méz, fűszerek) ritkán pótlandók, így a valós heti költség jellemzően ennél is kevesebb.'+(storageOK?'':' — Most nem tudja menteni a haladást.')+'</div>';
  return h;
}

/* ---------- EVENTS ---------- */
document.addEventListener("click",function(ev){
  var el=ev.target.closest("[data-act]"); if(!el) return;
  var act=el.getAttribute("data-act");
  // onboarding
  if(act==="ob-pick"){ var key=el.getAttribute("data-key"),v=el.getAttribute("data-v"); obDraft[key]=v; obErr=""; if(key==="sex") applyTheme(v); renderOnboarding(); return; }
  if(act==="ob-diet"){ var v2=el.getAttribute("data-v"); obDraft.diet=obDraft.diet||[]; var ix=obDraft.diet.indexOf(v2); if(ix>=0) obDraft.diet.splice(ix,1); else obDraft.diet.push(v2); renderOnboarding(); return; }
  if(act==="ob-sport"){ var sv=el.getAttribute("data-v"); obDraft.sports=obDraft.sports||[]; var sx=obDraft.sports.indexOf(sv); if(sx>=0) obDraft.sports.splice(sx,1); else obDraft.sports.push(sv); renderOnboarding(); return; }
  if(act==="ob-skill"){ var kv=el.getAttribute("data-v"); obDraft.skills=obDraft.skills||[]; obDraft.skillLvl=obDraft.skillLvl||{}; var ki=obDraft.skills.indexOf(kv); if(ki>=0){ obDraft.skills.splice(ki,1); delete obDraft.skillLvl[kv]; } else { obDraft.skills.push(kv); if(obDraft.skillLvl[kv]==null) obDraft.skillLvl[kv]=0; } renderOnboarding(); return; }
  if(act==="ob-skilllvl"){ var lk=el.getAttribute("data-k"),ll=+el.getAttribute("data-l"); obDraft.skillLvl=obDraft.skillLvl||{}; obDraft.skillLvl[lk]=ll; renderOnboarding(); return; }
  if(act==="ob-unit"){ if(_curStep==="target"){ var iv=document.getElementById("in-weeks"); if(iv) obDraft.tval=iv.value; } obDraft.tunit=el.getAttribute("data-v"); renderOnboarding(); return; }
  if(act==="ob-next"){ obNext(); return; }
  if(act==="ob-back"){ obBack(); return; }
  if(act==="ob-finish"){ profile={sex:obDraft.sex,age:obDraft.age,cm:obDraft.cm,kg:obDraft.kg,bf:obDraft.bf,bfTarget:obDraft.bfTarget,type:obDraft.type,sports:obDraft.sports||[],freq:obDraft.freq,diff:obDraft.diff,goal:obDraft.goal,targetKg:obDraft.targetKg,tval:obDraft.tval,tunit:obDraft.tunit,weeks:obDraft.weeks,diet:obDraft.diet||[],maxes:obDraft.maxes||{},skills:obDraft.skills||[],skillLvl:obDraft.skillLvl||{},_plan:obDraft._plan||computePlan(obDraft)}; saveProfile(); applyTheme(profile.sex); onboarding=false; tab="terv"; render(); return; }
  if(act==="edit-profile"){ obDraft=JSON.parse(JSON.stringify(profile)); onboarding=true; _curStep="sex"; obErr=""; renderOnboarding(); return; }
  // app
  if(act==="tab"){ tab=el.getAttribute("data-tab"); openMeal=-1; render(); return; }
  if(act==="day"){ var dir=parseInt(el.getAttribute("data-dir"),10); sel=new Date(sel.getFullYear(),sel.getMonth(),sel.getDate()+dir); openMeal=-1; render(); return; }
  if(act==="today"){ sel=new Date(); openMeal=-1; render(); return; }
  if(act==="pip"){ var i=+el.getAttribute("data-ex"),j=+el.getAttribute("data-set"),d=dd(),cur=d.w[i]||0; d.w[i]=(cur===j+1)?j:(j+1); saveState(); render(); return; }
  if(act==="rest"){ var dr=dd(); dr.r=!dr.r; saveState(); render(); return; }
  if(act==="diffadj"){ var dir=+el.getAttribute("data-dir"),nd=Math.min(5,Math.max(1,diffOf(profile)+dir)); profile.diff=nd; profile.diffAdjustedAt=iso(new Date()); profile._plan=computePlan(profile); saveProfile(); render(); return; }
  if(act==="diffsug"){ if(el.getAttribute("data-v")==="yes"){ var sg=fbSuggest(); if(sg){ profile.diff=sg.to; profile._plan=computePlan(profile); } } profile.diffAdjustedAt=iso(new Date()); saveProfile(); render(); return; }
  if(act==="sessfb"){ var ds=dd(); ds.fb=el.getAttribute("data-v"); saveState(); render(); return; }
  if(act==="exfb"){ var dx=dd(),xi=+el.getAttribute("data-ex"); dx.xf=dx.xf||{}; dx.xf[xi]=el.getAttribute("data-v"); saveState(); render(); return; }
  if(act==="meal"){ var dm=dd(),mi=+el.getAttribute("data-m"); dm.m[mi]=!dm.m[mi]; saveState(); render(); return; }
  if(act==="expand"){ var e2=+el.getAttribute("data-m"); openMeal=(openMeal===e2)?-1:e2; render(); return; }
  if(act==="swapi"){ var oid=el.getAttribute("data-ig"); if(!profile.swaps) profile.swaps={}; var nx=nextInGroup(oid); if(nx===oid) delete profile.swaps[oid]; else profile.swaps[oid]=nx; saveProfile(); render(); return; }
  if(act==="shop"){ var k=el.getAttribute("data-key"); if(state.shop[k]) delete state.shop[k]; else state.shop[k]=true; saveState(); render(); return; }
  if(act==="askreset"){ modal=true; render(); return; }
  if(act==="cancelreset"){ modal=false; render(); return; }
  if(act==="doreset"){ state.shop={}; saveState(); modal=false; render(); return; }
  if(act==="export"){ doExport(); return; }
  if(act==="closeexp"){ exportModal=""; render(); return; }
  if(act==="exinfo"){ infoEx=el.getAttribute("data-n"); render(); return; }
  if(act==="closeinfo"){ infoEx=""; render(); return; }
});
render();
})();
